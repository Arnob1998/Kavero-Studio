# LiteLLM baseline for Kavero Studio.
# Product runtime is not rewired by this config.

model_list:
  # Current Kavero orchestration/chat default:
  # prompt refiner, Canvas Copilot, Auto Segment planning, image judge, and future chat flows.
  - model_name: kavero-chat-orchestration-default
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
      api_key: os.environ/GEMINI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  # Current Kavero image-generation default, labeled "Nano Banana 2" in today's UI:
  # standalone /generate, canvas image generation, and Auto Segment image/mask generation.
  - model_name: kavero-image-generation-default
    litellm_params:
      model: gemini/gemini-3.1-flash-image-preview
      api_key: os.environ/GEMINI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  # Curated OpenAI GPT-5.6 orchestration models.
  - model_name: kavero-chat-openai-gpt-5-6
    litellm_params:
      model: gpt-5.6
      api_key: os.environ/OPENAI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  - model_name: kavero-chat-openai-gpt-5-6-sol
    litellm_params:
      model: gpt-5.6-sol
      api_key: os.environ/OPENAI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  - model_name: kavero-chat-openai-gpt-5-6-terra
    litellm_params:
      model: gpt-5.6-terra
      api_key: os.environ/OPENAI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  - model_name: kavero-chat-openai-gpt-5-6-luna
    litellm_params:
      model: gpt-5.6-luna
      api_key: os.environ/OPENAI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  # Runtime-gated until reference-image/edit support passes across every Kavero image flow.
  - model_name: kavero-image-openai-gpt-image-2
    litellm_params:
      model: gpt-image-2
      api_key: os.environ/OPENAI_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  # Additional optional providers.
  - model_name: kavero-chat-groq-example
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
    configurable_clientside_auth_params: ["api_key"]

  - model_name: kavero-chat-ollama-example
    litellm_params:
      model: ollama_chat/llama3.1
      api_base: os.environ/OLLAMA_BASE_URL

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  custom_auth: kavero_auth.user_api_key_auth
  allow_client_side_credentials: true
