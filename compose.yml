name: kavero

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-replace-with-local-publishable-key}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://127.0.0.1:3000}
    depends_on:
      supabase-bootstrap:
        condition: service_completed_successfully
    ports:
      - "${KAVERO_APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://supabase-kong:8000}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-replace-with-local-publishable-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-replace-with-local-service-role-key}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://127.0.0.1:3000}
      KAVERO_API_ORIGIN: ${KAVERO_API_ORIGIN:-http://127.0.0.1:3000}
      KAVERO_DEPLOYMENT_PROFILE: local-first
      KAVERO_AUTH_MODE: password
      KAVERO_STORAGE_PROVIDER: kavero-managed
      KAVERO_MANAGED_STORAGE_BACKEND: local-filesystem
      KAVERO_LOCAL_STORAGE_ROOT: /data/kavero-storage
      KAVERO_MODEL_GATEWAY: ${KAVERO_MODEL_GATEWAY:-litellm}
      KAVERO_LITELLM_BASE_URL: ${KAVERO_LITELLM_BASE_URL:-http://litellm:4000}
      KAVERO_LITELLM_API_KEY: ${KAVERO_LITELLM_API_KEY:-sk-replace-with-kavero-litellm-api-key}
      KAVERO_MODEL_GATEWAY_CREDENTIAL_MODE: ${KAVERO_MODEL_GATEWAY_CREDENTIAL_MODE:-env-or-user}
    volumes:
      - kavero-local-storage:/data/kavero-storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

  litellm:
    image: docker.litellm.ai/berriai/litellm:latest
    command: ["--port", "4000", "--config", "/app/config.yaml"]
    expose:
      - "4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-replace-with-litellm-master-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  supabase-bootstrap:
    build:
      context: .
      dockerfile: docker/supabase/bootstrap.Dockerfile
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
      supabase-storage:
        condition: service_started
      supabase-kong:
        condition: service_started
    environment:
      PGHOST: supabase-db
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-postgres}
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-replace-with-postgres-password}
      SUPABASE_AUTH_URL: http://supabase-auth:9999
      SUPABASE_REST_URL: http://supabase-rest:3000
      SUPABASE_STORAGE_URL: http://supabase-storage:5000
      SUPABASE_KONG_URL: http://supabase-kong:8000
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-replace-with-local-publishable-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-replace-with-local-service-role-key}
      KAVERO_COMPOSE_BOOTSTRAP_WAIT_MS: ${KAVERO_COMPOSE_BOOTSTRAP_WAIT_MS:-120000}
      KAVERO_COMPOSE_BOOTSTRAP_POLL_MS: ${KAVERO_COMPOSE_BOOTSTRAP_POLL_MS:-1000}

  supabase-kong:
    image: kong:2.8.1
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
      supabase-storage:
        condition: service_started
    ports:
      - "${SUPABASE_KONG_PORT:-54321}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./docker/supabase/kong.yml:/home/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 20

  supabase-auth:
    image: supabase/gotrue:v2.177.0
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://127.0.0.1:3000}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_SITE_URL:-http://127.0.0.1:3000},http://localhost:3000,http://localhost:3000/auth/callback,http://127.0.0.1:3000/auth/callback
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-replace-with-postgres-password}@supabase-db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-replace-with-local-jwt-secret}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "false"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.local
      GOTRUE_SMTP_HOST: localhost
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: Kavero Local
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:9999/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  supabase-rest:
    image: postgrest/postgrest:v12.2.12
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-replace-with-postgres-password}@supabase-db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-replace-with-local-jwt-secret}
      PGRST_DB_USE_LEGACY_GUCS: "true"
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions

  supabase-storage:
    image: supabase/storage-api:v1.24.7
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-replace-with-local-anon-key}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-replace-with-local-service-role-key}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-replace-with-local-jwt-secret}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-replace-with-postgres-password}@supabase-db:5432/${POSTGRES_DB:-postgres}
      PGOPTIONS: -c search_path=storage,public
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - supabase-storage-data:/var/lib/storage
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5000/status",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  supabase-db:
    image: supabase/postgres:15.8.1.060
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-with-postgres-password}
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-replace-with-local-jwt-secret}
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./docker/supabase/init/00-kavero-roles.sh:/docker-entrypoint-initdb.d/00-kavero-roles.sh:ro
      - ./docker/supabase/init/zz-kavero-roles.sh:/docker-entrypoint-initdb.d/zz-kavero-roles.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  kavero-local-storage:
  supabase-db-data:
  supabase-storage-data:
